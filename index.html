<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE QUOTA ― 外資IT AE 商談シミュレーター</title>
<meta name="description" content="外資ITのアカウントエグゼクティブとして、MEDDICで東陽精機との商談を13週で攻略するビジネスADV。">
<meta name="theme-color" content="#050b18">
<meta property="og:type" content="website">
<meta property="og:title" content="THE QUOTA ― 外資IT AE 商談シミュレーター">
<meta property="og:description" content="MEDDICで東陽精機との商談を13週で攻略するビジネスADV。あなたの選択が四半期の数字を決める。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23050b18'/><text x='50' y='68' font-size='54' font-weight='900' text-anchor='middle' fill='%234da3ff' font-family='sans-serif'>Q</text></svg>">
<style>
  :root {
    --accent: #4da3ff;
    --accent-2: #7bbcff;
    --good: #4ade80;
    --bad: #f87171;
    --warn: #fbbf24;
    --ink: #eef3fa;
    --ink-dim: #a3b8d6;
    --ink-mute: #6f86a6;
    --glass: rgba(11,21,40,.62);
    --glass-2: rgba(8,16,32,.84);
    --line: rgba(132,178,242,.18);
    --line-bright: rgba(150,195,255,.40);
    --shadow: 0 18px 50px rgba(0,0,0,.55);
  }
  * { box-sizing: border-box; user-select: none; }
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  body {
    font-family: "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 9px; }
  ::-webkit-scrollbar-thumb { background: rgba(120,170,255,.25); border-radius: 9px; }

  #stage { position: fixed; inset: 0; overflow: hidden; cursor: pointer; }
  .bg { position: absolute; inset: 0; width: 100%; height: 100%; transition: background .5s; background: #0d1626; }
  /* シーン背景 */
  .scene-office  { background: linear-gradient(rgba(10,20,40,.38),rgba(10,20,40,.38)),  url(bg-office.svg)  center/cover no-repeat; }
  .scene-meeting { background: linear-gradient(rgba(10,15,30,.38),rgba(10,15,30,.38)),  url(bg-meeting.svg) center/cover no-repeat; }
  .scene-exec    { background: linear-gradient(rgba(5,0,0,.22),rgba(5,0,0,.22)),        url(bg-exec.svg)    center/cover no-repeat; }
  .scene-online  { background: linear-gradient(rgba(0,10,30,.25),rgba(0,10,30,.25)),    url(bg-online.svg)  center/cover no-repeat; }
  .scene-procure { background: linear-gradient(rgba(10,12,20,.38),rgba(10,12,20,.38)),  url(bg-procure.svg) center/cover no-repeat; }
  .vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 5;
    background:
      radial-gradient(ellipse at 50% 34%, transparent 48%, rgba(0,2,8,.42) 86%, rgba(0,1,5,.62) 100%);
  }
  /* 画面下部スクリム: キャラの足元を馴染ませ、テキストの可読性を上げる */
  #floorScrim {
    position: absolute; left: 0; right: 0; bottom: 0; height: 46%; z-index: 6;
    pointer-events: none;
    background: linear-gradient(180deg, transparent 0%, rgba(4,9,18,.55) 58%, rgba(3,7,15,.88) 100%);
  }
  .tint { position: absolute; inset: 0; pointer-events: none; transition: background .6s; z-index: 7; }

  /* ---------- sprites (実写を楕円マスクでソフトに) ---------- */
  #sprites { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
  .sprite {
    position: absolute; bottom: 116px; left: 50%;
    width: min(400px, 45vw); height: min(60vh, 560px);
    transform: translateX(-50%);
    background-repeat: no-repeat;
    -webkit-mask-image: linear-gradient(to bottom, #000 58%, rgba(0,0,0,0) 100%);
    mask-image: linear-gradient(to bottom, #000 58%, rgba(0,0,0,0) 100%);
    transition: filter .4s ease, transform .4s ease, opacity .4s ease;
    animation: spriteIn .5s cubic-bezier(.2,.7,.3,1);
    /* 接地影 + ごく薄いリムライトで背景から立たせる */
    filter: drop-shadow(0 20px 26px rgba(0,0,0,.62)) drop-shadow(0 0 1px rgba(150,190,255,.45));
  }
  .sprite.pos-l { left: 29%; }
  .sprite.pos-r { left: 71%; }
  .sprite.dim {
    filter: brightness(.42) saturate(.65) blur(.4px) drop-shadow(0 18px 26px rgba(0,0,0,.6));
  }
  .sprite.half {
    filter: brightness(.82) saturate(.92) drop-shadow(0 18px 26px rgba(0,0,0,.6)) drop-shadow(0 0 1px rgba(150,190,255,.4));
  }
  .sprite.active {
    transform: translateX(-50%) scale(1.035);
    filter: brightness(1.04) drop-shadow(0 22px 30px rgba(0,0,0,.62)) drop-shadow(0 0 2px rgba(150,195,255,.55));
  }
  @keyframes spriteIn { from { opacity: 0; transform: translateX(-50%) translateY(26px); } }

  /* ---------- HUD ---------- */
  #hud {
    position: absolute; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px 30px;
    background: linear-gradient(180deg, rgba(2,7,16,.94) 0%, rgba(2,7,16,.5) 55%, transparent 100%);
    font-size: .78rem; pointer-events: none;
  }
  #hud .logo {
    font-weight: 800; letter-spacing: .16em; font-size: .92rem; color: #fff;
    padding-right: 14px; margin-right: 4px;
    border-right: 1px solid var(--line);
    text-shadow: 0 0 18px rgba(77,163,255,.4);
  }
  #hud .logo span { color: var(--accent); }
  .hud-item {
    display: flex; align-items: center; gap: 8px; white-space: nowrap;
    background: var(--glass); border: 1px solid var(--line);
    border-radius: 10px; padding: 5px 11px;
    color: var(--ink-dim);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 2px 12px rgba(0,0,0,.25);
    -webkit-backdrop-filter: blur(9px); backdrop-filter: blur(9px);
  }
  .hud-item b { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }
  .hud-item.bump { animation: hudBump .65s ease-out; }
  @keyframes hudBump {
    0% { box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 0 0 rgba(77,163,255,0); }
    25% { box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 0 18px rgba(77,163,255,.55); border-color: var(--accent); }
    100% { box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 2px 12px rgba(0,0,0,.25); }
  }
  .hud-bar { width: 92px; height: 5px; border-radius: 99px; background: rgba(255,255,255,.14); overflow: hidden; box-shadow: inset 0 0 0 1px rgba(0,0,0,.2); }
  .hud-bar i { display: block; height: 100%; border-radius: 99px; transition: width .55s cubic-bezier(.2,.7,.3,1); }
  #trustFill { background: linear-gradient(90deg, #f59e0b, #4ade80); box-shadow: 0 0 8px rgba(74,222,128,.4); }
  #weekFill { background: linear-gradient(90deg, #2f7fd8, var(--accent-2)); }
  .hud-danger { color: var(--bad); font-weight: 700; }
  #hud .spacer { flex: 1; }
  .hud-btn {
    pointer-events: auto; cursor: pointer;
    background: var(--glass); color: var(--ink);
    border: 1px solid var(--line); border-radius: 10px;
    font: inherit; font-size: .76rem; letter-spacing: .03em; padding: 6px 13px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 2px 12px rgba(0,0,0,.25);
    -webkit-backdrop-filter: blur(9px); backdrop-filter: blur(9px);
    transition: border-color .16s, background .16s, box-shadow .16s, transform .1s;
  }
  .hud-btn:hover { border-color: var(--accent); background: rgba(24,52,98,.7); box-shadow: 0 0 16px rgba(77,163,255,.3); }
  .hud-btn:active { transform: translateY(1px); }
  .hud-btn:focus-visible { outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 2px rgba(123,188,255,.45); }

  #sceneTag {
    position: absolute; top: 60px; left: 18px; z-index: 25;
    background: var(--glass-2); border: 1px solid var(--line-bright);
    border-radius: 999px; padding: 5px 18px; font-size: .75rem; letter-spacing: .05em;
    color: #cfe3ff; pointer-events: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 4px 14px rgba(0,0,0,.35);
    -webkit-backdrop-filter: blur(9px); backdrop-filter: blur(9px);
  }

  /* ---------- message window ---------- */
  #msgbox {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
    width: min(960px, 94vw); min-height: 150px; z-index: 20;
    background: linear-gradient(180deg, rgba(9,18,34,.84), rgba(4,9,19,.93));
    border: 1px solid var(--line-bright);
    border-radius: 18px;
    padding: 30px 34px 26px;
    /* 二重線風: 外側影 + 内側ハイライト + 内側うっすらブルーの縁 */
    box-shadow:
      0 22px 60px rgba(0,0,0,.62),
      inset 0 1px 0 rgba(255,255,255,.08),
      inset 0 0 0 1px rgba(120,170,255,.06);
    -webkit-backdrop-filter: blur(11px); backdrop-filter: blur(11px);
  }
  #msgbox.anim { animation: boxUp .42s cubic-bezier(.2,.7,.3,1); }
  @keyframes boxUp { from { opacity: 0; transform: translate(-50%, 16px); } }
  #namePlate {
    position: absolute; top: -15px; left: 24px;
    background: linear-gradient(135deg, #2877d8, #0c3d7e);
    border: 1px solid rgba(160,205,255,.6);
    border-radius: 9px; padding: 5px 20px;
    font-size: .82rem; font-weight: 700; letter-spacing: .05em;
    box-shadow: 0 6px 16px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.2);
  }
  #msgText { font-size: 1.02rem; line-height: 1.92; letter-spacing: .012em; min-height: 3.84em; color: #eaf1fb; }
  #msgText b { color: #9cc8ff; font-weight: 700; }
  #cursor {
    position: absolute; right: 18px; bottom: 14px;
    width: 24px; height: 24px; border-radius: 50%;
    display: grid; place-items: center; font-size: .68rem; color: #08111f;
    background: var(--accent); box-shadow: 0 0 14px rgba(77,163,255,.6);
    animation: bounce 1.1s infinite; opacity: 0;
  }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(3px); } }

  /* ---------- choices ---------- */
  #choices {
    position: absolute; left: 50%; bottom: 208px; transform: translateX(-50%);
    width: min(840px, 92vw); z-index: 22;
    display: none; flex-direction: column; gap: 10px;
  }
  #choices.show { display: flex; }
  .choice {
    position: relative; cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(180deg, rgba(12,24,46,.82), rgba(7,15,30,.9));
    border: 1px solid var(--line-bright);
    color: var(--ink); border-radius: 13px;
    padding: 14px 20px 14px 15px; font: inherit; font-size: .95rem; line-height: 1.55;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 6px 20px rgba(0,0,0,.32);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    animation: chIn .34s cubic-bezier(.2,.7,.3,1) backwards;
    transition: border-color .16s, background .16s, transform .16s, box-shadow .16s, opacity .16s;
  }
  .choice .num {
    flex-shrink: 0; width: 28px; text-align: center;
    font-size: .7rem; font-weight: 800; letter-spacing: .04em;
    color: var(--accent-2); font-variant-numeric: tabular-nums; opacity: .8;
    border-right: 1px solid var(--line); padding-right: 13px; margin-right: 1px;
    transition: color .16s, opacity .16s;
  }
  .choice .txt { flex: 1; }
  .choice:nth-child(1) { animation-delay: 0s; }
  .choice:nth-child(2) { animation-delay: .07s; }
  .choice:nth-child(3) { animation-delay: .14s; }
  .choice:nth-child(4) { animation-delay: .21s; }
  .choice:hover, .choice.focus {
    border-color: var(--accent);
    background: linear-gradient(180deg, rgba(26,60,114,.92), rgba(15,38,74,.94));
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(77,163,255,.3), inset 0 1px 0 rgba(255,255,255,.09);
  }
  .choice:hover .num, .choice.focus .num { opacity: 1; color: #d4e6ff; }
  .choice:focus-visible { outline: none; }
  .choice.picked { animation: chPick .42s ease-out forwards; border-color: #c4e2ff; }
  .choice.dimmed { opacity: .32; transform: scale(.99); filter: saturate(.7); }
  @keyframes chIn { from { opacity: 0; transform: translateY(16px); } }
  @keyframes chPick {
    0%   { box-shadow: 0 0 0 rgba(140,200,255,0); }
    30%  { background: linear-gradient(180deg, rgba(70,132,212,.96), rgba(40,86,160,.96)); box-shadow: 0 0 30px rgba(150,205,255,.72); }
    100% { box-shadow: 0 0 0 rgba(140,200,255,0); }
  }

  /* ---------- delta chips ---------- */
  #deltas {
    position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
    z-index: 40; display: flex; flex-direction: column; gap: 7px; align-items: center;
    pointer-events: none;
  }
  .chip {
    background: rgba(5,12,26,.92); border-radius: 999px;
    padding: 5px 18px; font-size: .85rem; font-weight: 700;
    border: 1px solid rgba(255,255,255,.25);
    animation: chipIn .35s ease-out, chipOut .5s ease-in 2.1s forwards;
  }
  .chip.up { color: var(--good); border-color: rgba(74,222,128,.5); }
  .chip.down { color: var(--bad); border-color: rgba(248,113,113,.5); }
  .chip.flat { color: #cbd5e1; }
  .chip.meddic { color: #9cc8ff; border-color: rgba(77,163,255,.6); }
  @keyframes chipIn { from { opacity: 0; transform: translateY(-12px) scale(.9); } }
  @keyframes chipOut { to { opacity: 0; transform: translateY(-10px); } }

  /* ---------- drawer (資料パネル) ---------- */
  #drawerScrim {
    position: absolute; inset: 0; z-index: 45;
    background: rgba(2,6,14,.55);
    -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  #drawerScrim.on { opacity: 1; pointer-events: auto; }
  #drawer {
    position: absolute; top: 0; right: -360px; bottom: 0; width: 340px; z-index: 50;
    background: linear-gradient(180deg, rgba(8,16,32,.96), rgba(5,10,22,.97));
    border-left: 1px solid var(--line-bright);
    padding: 22px 22px 24px; overflow-y: auto;
    transition: right .32s cubic-bezier(.2,.7,.3,1); cursor: default;
    font-size: .84rem;
    box-shadow: -24px 0 70px rgba(0,0,0,.55);
  }
  #drawer.open { right: 0; }
  #drawer .drawer-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 0 0 14px; padding-bottom: 12px; border-bottom: 1px solid var(--line);
  }
  #drawer .drawer-head .title {
    font-size: .78rem; font-weight: 800; letter-spacing: .14em; color: #cfe3ff;
  }
  .drawer-close {
    cursor: pointer; width: 30px; height: 30px; border-radius: 8px;
    background: var(--glass); border: 1px solid var(--line); color: var(--ink-dim);
    font-size: .9rem; line-height: 1; display: grid; place-items: center;
    transition: border-color .15s, background .15s, color .15s;
  }
  .drawer-close:hover { border-color: var(--accent); color: #fff; background: rgba(24,52,98,.7); }
  .drawer-close:focus-visible { outline: none; box-shadow: 0 0 0 2px rgba(123,188,255,.5); }
  #drawer h3 {
    font-size: .72rem; letter-spacing: .12em; color: var(--ink-mute);
    margin: 20px 0 9px; text-transform: uppercase;
  }
  .d-row { display: flex; justify-content: space-between; padding: 4px 0; color: var(--ink-dim); }
  .d-row b { color: var(--ink); }
  .meddic-item { display: flex; gap: 9px; align-items: center; padding: 6px 0; border-bottom: 1px dashed rgba(255,255,255,.1); }
  .meddic-item .dot {
    width: 17px; height: 17px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,.25); display: grid; place-items: center; font-size: .65rem;
  }
  .meddic-item.on .dot { background: var(--good); border-color: var(--good); color: #06270f; }
  .meddic-item.on .dot::after { content: "✓"; }
  .meddic-item small { display: block; color: #7e95b5; font-size: .7rem; }
  #drawerNotes { color: #aebed2; font-size: .78rem; line-height: 1.7; }

  /* ---------- overlays (title / ending / transition) ---------- */
  .overlay {
    position: absolute; inset: 0; z-index: 60;
    display: flex; align-items: center; justify-content: center;
  }
  #fade {
    position: absolute; inset: 0; z-index: 55; background: #000;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  #fade.on { opacity: 1; }

  #title {
    flex-direction: column; cursor: pointer; overflow: hidden;
    background:
      radial-gradient(ellipse at 50% 68%, #0e2a50 0%, #071027 55%, #04070f 100%);
    animation: fadeIn .7s ease-out;
  }
  /* 深みのためのビネット + ごく薄いノイズ */
  #title::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 42%, transparent 46%, rgba(0,2,8,.7) 100%);
  }
  #title::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: .05; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  #title h1 {
    position: relative; z-index: 1;
    font-size: clamp(2.7rem, 8.2vw, 5.2rem); margin: 0; letter-spacing: .2em; font-weight: 900;
    background: linear-gradient(180deg, #ffffff 0%, #cfe4ff 45%, #6fb0ff 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 60px rgba(77,163,255,.4);
    filter: drop-shadow(0 4px 24px rgba(77,163,255,.25));
    animation: titleIn 1.2s cubic-bezier(.2,.7,.3,1);
  }
  #title .sub {
    position: relative; z-index: 1;
    color: #c2d6f0; letter-spacing: .14em; margin: 14px 0 54px; font-size: .96rem;
    text-shadow: 0 1px 8px rgba(0,0,0,.6);
    animation: titleIn 1.2s ease-out .2s backwards;
  }
  #title .start {
    position: relative; z-index: 1; overflow: hidden;
    font-size: 1.04rem; color: #eaf3ff; border: 1px solid rgba(140,185,255,.55);
    padding: 14px 60px; border-radius: 999px; letter-spacing: .22em; font-weight: 700;
    background: linear-gradient(180deg, rgba(28,62,116,.45), rgba(14,34,68,.5));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 8px 26px rgba(0,0,0,.4);
    animation: titleIn 1.2s ease-out .35s backwards, pulse 2.4s 1.6s infinite;
    transition: border-color .2s, box-shadow .2s, transform .12s, background .2s;
  }
  /* ホバー時に光が走る */
  #title .start::before {
    content: ""; position: absolute; top: 0; left: -120%; width: 60%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(180,215,255,.35), transparent);
    transform: skewX(-18deg); transition: left .55s ease;
  }
  #title .start:hover {
    border-color: var(--accent-2); transform: translateY(-1px);
    background: linear-gradient(180deg, rgba(38,80,148,.6), rgba(20,46,90,.62));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 0 30px rgba(77,163,255,.45);
  }
  #title .start:hover::before { left: 130%; }
  #title .start:focus-visible { outline: none; border-color: #cfe6ff; box-shadow: 0 0 0 3px rgba(123,188,255,.5), 0 0 30px rgba(77,163,255,.4); }
  #title .hint { position: relative; z-index: 1; margin-top: 28px; font-size: .76rem; color: #7089a8; animation: titleIn 1.2s ease-out .5s backwards; }
  @keyframes titleIn { from { opacity: 0; transform: translateY(18px); } }
  @keyframes fadeIn { from { opacity: 0; } }
  @keyframes pulse { 0%,100% { box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 0 0 rgba(77,163,255,.4); } 50% { box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 0 28px rgba(77,163,255,.5); } }

  #ending { display: none; background: rgba(2,6,14,.9); backdrop-filter: blur(4px); cursor: default; }
  #endingCard {
    width: min(760px, 94vw); max-height: 90vh; overflow-y: auto;
    background: linear-gradient(180deg, #0a1730, #060d1d);
    border: 1px solid rgba(120,170,255,.4); border-radius: 18px;
    padding: 36px 40px;
  }
  #endingCard h2 { margin: 0 0 6px; font-size: 1.45rem; }
  #endingCard h2.win { color: var(--good); } #endingCard h2.slip { color: var(--warn); } #endingCard h2.loss { color: var(--bad); }
  #endingCard .story { font-size: .92rem; line-height: 2; color: #d7e2f2; }
  #endingCard .story b { color: #9cc8ff; }
  .score-line { display: flex; align-items: baseline; gap: 12px; margin: 22px 0 2px; }
  #scoreNum { font-size: 3.2rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
  .rank { font-size: .92rem; font-weight: 700; color: #9cc8ff; margin-bottom: 12px; }
  .b-table { width: 100%; border-collapse: collapse; font-size: .84rem; margin: 8px 0 20px; }
  .b-table td { padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,.12); }
  .b-table td:last-child { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }
  .review-item {

const AudioFX = {
  ctx: null, muted: false,
  init() {
    if (!this.ctx) { try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (this.ctx && this.ctx.state === "suspended") this.ctx.resume();
  },
  tone(freq, dur, type, gain, when) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime + (when || 0);
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    g.gain.setValueAtTime(gain || .06, t);
    g.gain.exponentialRampToValueAtTime(.0001, t + dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + dur + .05);
  },
  blip()   { this.tone(740, .05, "square", .025); },
  select() { this.tone(620, .07, "triangle", .06); this.tone(930, .09, "triangle", .05, .05); },

/* ============================================================
   エンディング判定 (クラシック版と同ロジック)
============================================================ */
function computeEnding() {
  const m = S.meddic;
  const meddicCount = Object.values(m).filter(Boolean).length;
  let power = S.trust;
  if (m.C) power += 15;
  if (S.flags.ebMet) power += 15;
  if (m.DC) power += 8;
  if (m.M) power += 8;
  if (S.flags.genbaIgnored) power -= 12;
  if (S.flags.blamed) power -= 25;
  const inQuarter = S.week <= QUARTER_WEEKS && S.flags.closeInQuarter && !S.flags.stall;

  let type, title, story;
  if (S.trust < 30 || S.flags.blamed) {
    type = "loss"; title = "失注 ― 商談主導権の喪失";
    story = `<p>役員会の数日後、五十嵐課長から短いメールが届いた。<b>「諸事情を総合的に勘案し、今回はNSG社の提案を採用することになりました」</b>。電話をかけたが、もう以前のように繋がることはなかった。</p><p>阿部との1on1。「何が起きたのか、Loss Reviewで一緒に振り返ろう」。パイプラインに空いた3,000万円の穴が、静かにあなたを見上げている。</p>`;
  } else if (power >= 80) {
    if (inQuarter) {
      type = "win"; title = "受注 ― 期内クローズ達成!";
      story = `<p>四半期最終週の木曜、五十嵐課長から着信。<b>「経営会議、承認されました。発注書、今日付で出します」</b>。受話器を置いた瞬間、フロアの同僚たちがゴングを鳴らした。</p><p>代々原常務はあなたのROI資料をほぼそのまま経営会議で使い、DERA部長は「現場の話を聞いた唯一のベンダー」と援護したという。値引き${S.discount}%、3年契約。<b>クォータ達成。</b>阿部のSlackには🎉が並んだ。——来期のクォータは、たぶん上がる。</p>`;
    } else {
      type = "slip"; title = "受注見込み ― ただし期ズレ(Slip)";
      story = `<p>商談自体は勝ち筋に乗った。だが決裁が四半期をまたぎ、<b>発注は来期にずれ込んだ</b>。阿部は「Good dealだ。ただし——」と言ってフォーキャスト画面を指した。<b>「今期のコミットには入らない」</b>。</p><p>案件の中身は良い。失ったのは、時間だけだ。そして外資の営業にとって、時間はクォータと同義である。</p>`;
    }
  } else if (power >= 60) {
    type = "slip"; title = "継続審議 ― クローズに至らず";
    story = `<p>経営会議の結論は<b>「継続検討」</b>。悪い感触ではないが、決定打に欠けた。${!S.flags.ebMet ? "決裁者である代々原常務と直接話せていれば、結果は違ったかもしれない。" : ""}${!m.M ? "投資対効果を数字で示せていれば、役員会の景色は違ったはずだ。" : ""}${!m.C ? "社内であなたの代わりに戦ってくれる人が、最後までいなかった。" : ""}</p><p>案件はまだ生きている。だが今期の数字には間に合わなかった。フォーキャスト会議でのあなたのステータスは「Slipped」。来期、この続きを取りに行く。</p>`;
  } else {
    type = "loss"; title = "失注 ― 競合NSGに敗北";
    story = `<p>役員会はNSGを選んだ。決め手は「既存ベンダーとしての安心感」と「現場・役員への丁寧な根回し」だったと、後に五十嵐課長が教えてくれた。<b>商談は会議室の中ではなく、あなたの見えない場所で決まっていた</b>。</p><p>Loss Reviewで阿部が言った。「製品で負けたんじゃない。商談の進め方で負けたんだ。——次は、どう戦う?」</p>`;
  }

  const meddicScore = meddicCount * 10;
  const trustScore = Math.round(Math.max(0, Math.min(S.trust, 100)) / 5);
  const marginScore = Math.max(0, 10 - Math.round(S.discount / 2));
  const timeScore = (type === "win" && inQuarter) ? 10 : (type === "slip" ? 4 : 0);
  const total = meddicScore + trustScore + marginScore + timeScore;

  let rank;
  if (total >= 90) rank = "S ― President's Club 確実。グローバル表彰の常連クラス。";
  else if (total >= 75) rank = "A ― トップパフォーマー。クォータ達成が見える実力。";
  else if (total >= 55) rank = "B ― 中堅AE。型は身についてきた。あとは実行の精度。";
  else if (total >= 35) rank = "C ― 要PIP回避。マネージャーとの1on1が増えそうだ。";
  else rank = "D ― セールスイネーブルメント研修への再入校を推奨。";

  return { type, title, story, total, rank, breakdown: [
    ["MEDDIC 充足(" + meddicCount + "/6)", meddicScore + " / 60"],
    ["顧客との信頼度", trustScore + " / 20"],
    ["利幅の防衛(値引き" + S.discount + "%)", marginScore + " / 10"],
    ["期内クローズ", timeScore + " / 10"],
  ]};
}

/* 実写ポートレート設定 (顔がフレームに収まるよう size=ズーム / pos=表示位置を1枚ずつ調整) */
const PHOTO = {
  kevin:     { src: "chars/cut/abe.png",      size: "80%",  pos: "50% 0%"  },
  sato:      { src: "chars/cut/igarashi.png", size: "130%", pos: "50% 5%"  },
  murata:    { src: "chars/cut/dera.png",     size: "120%", pos: "50% 8%"  },
  takahashi: { src: "chars/cut/yoyohara.png", size: "116%", pos: "50% 8%"  },
  nishino:   { src: "chars/cut/takamure.png", size: "114%", pos: "50% 6%"  },
};

function setBg(key, tint) {
  $("bg").className = "bg scene-" + (key || "office");
  $("tint").style.background = tint || "rgba(0,0,0,0)";
}

function setCast(cast) {
  const pos = cast.length >= 2 ? ["pos-l", "pos-r"] : [""];
  $("sprites").innerHTML = cast.map((id, i) => {
    const p = PHOTO[id] || {};
    return `<div class="sprite ${pos[i] || ""} half" id="sp-${id}"
      style="background-image:url('${p.src}');background-size:${p.size};background-position:${p.pos}"></div>`;
  }).join("");
}

function focusSpeaker(sp, face) {
  document.querySelectorAll(".sprite").forEach(el => {
    const id = el.id.slice(3);
    if (sp && id === sp) {
      el.classList.remove("dim", "half"); el.classList.add("active");
    } else {
      el.classList.remove("active");
      el.classList.toggle("dim", !!sp);
      el.classList.toggle("half", !sp);
    }
  });
}

function typeLine(text) {
  fullText = text;
  const el = $("msgText");
  $("cursor").style.opacity = 0;
  if (typeTimer) clearInterval(typeTimer);
  if (window.__FAST) { el.textContent = text; typing = false; $("cursor").style.opacity = 1; return; }
  typing = true; el.textContent = "";
  let i = 0;
  typeTimer = setInterval(() => {
    i += 1;
    el.textContent = text.slice(0, i);
    if (i >= text.length) { clearInterval(typeTimer); typing = false; $("cursor").style.opacity = 1; }
  }, 24);
}

function showLine() {
  const line = cur.lines[cur.idx];
  const np = $("namePlate");
  if (line.sp) {
    np.style.display = "block";
    np.textContent = CHARS[line.sp].name;
    focusSpeaker(line.sp, line.face || "normal");
  } else {
    np.style.display = "none";
    focusSpeaker(null);
  }
  typeLine(line.text);
}

let choiceFocus = -1, picking = false, choicesReady = false;

function showChoices() {
  cur.phase = "choosing";
  $("cursor").style.opacity = 0;
  const box = $("choices");
  box.innerHTML = cur.choiceList.map((c, i) =>
    `<button class="choice" data-i="${i}"><span class="num">${String(i + 1).padStart(2, "0")}</span><span class="txt">${c.label}</span></button>`).join("");
  box.classList.add("show");
  box.querySelectorAll(".choice").forEach(btn => {
    const i = +btn.dataset.i;
    btn.addEventListener("click", (e) => { e.stopPropagation(); pickChoice(i); });
    btn.addEventListener("mousemove", () => { if (!picking) setChoiceFocus(i); });
  });
  choiceFocus = -1; picking = false;
  /* 連打で直前のテキスト送りが選択に化けないよう、表示直後だけ入力を無視 */
  choicesReady = false;
  setTimeout(() => { choicesReady = true; }, 240);
}

function setChoiceFocus(i) {
  const els = [...document.querySelectorAll("#choices .choice")];
  if (!els.length) return;
  if (i < 0) i = els.length - 1; else if (i >= els.length) i = 0;
  choiceFocus = i;
  els.forEach((el, idx) => el.classList.toggle("focus", idx === i));
}

function moveChoiceFocus(d) {
  const n = document.querySelectorAll("#choices .choice").length;
  if (!n) return;
  setChoiceFocus(choiceFocus < 0 ? (d > 0 ? 0 : n - 1) : choiceFocus + d);
}

function pushDelta(text, cls) {
  const el = document.createElement("div");
  el.className = "chip " + cls;
  el.textContent = text;
  $("deltas").appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

function pickChoice(idx) {
  if (picking || !choicesReady || cur.phase !== "choosing") return;
  picking = true;
  AudioFX.select();
  /* 決定演出: 選んだカードを一瞬光らせ、他をフェードしてから確定 */
  const els = [...document.querySelectorAll("#choices .choice")];
  els.forEach((el, i) => { el.classList.toggle("picked", i === idx); el.classList.toggle("dimmed", i !== idx); });
  setTimeout(() => commitChoice(idx), 150);
}

function bumpHud(id) {
  const el = $(id); if (!el) return;
  el.classList.remove("bump"); void el.offsetWidth; el.classList.add("bump");
}

function commitChoice(idx) {
  const c = cur.choiceList[idx];
  $("choices").classList.remove("show");

  const before = {
    trust: S.trust, week: S.week, discount: S.discount,
    meddic: Object.entries(S.meddic).filter(([, v]) => v).map(([k]) => k),
  };
  if (c.effects) c.effects();
  S.trust = Math.max(0, Math.min(100, S.trust));

  const coach = val(c.coach);
  S.log.push({ scene: val(SCENES[cur.id].tag), choice: c.label, tone: coach.tone, note: coach.note });

  const dt = S.trust - before.trust;
  if (dt > 0) { pushDelta(`信頼度 +${dt}`, "up"); AudioFX.good(); bumpHud("hi-trust"); }
  if (dt < 0) { pushDelta(`信頼度 ${dt}`, "down"); AudioFX.bad(); bumpHud("hi-trust"); }
  const dw = S.week - before.week;
  if (dw) { pushDelta(`⏱ ${dw}週 経過`, "flat"); bumpHud("hi-week"); }
  const dd = S.discount - before.discount;
  if (dd > 0) { pushDelta(`値引き +${dd}%`, "down"); bumpHud("hi-disc"); }
  Object.entries(S.meddic).forEach(([k, v]) => {
    const had = before.meddic.includes(k);
    const def = MEDDIC_DEFS.find(x => x.key === k);
    if (v && !had) { pushDelta(`MEDDIC獲得: ${def.name} ✓`, "meddic"); bumpHud("hi-meddic"); }
    if (!v && had) { pushDelta(`MEDDIC喪失: ${def.name} ✗`, "down"); bumpHud("hi-meddic"); }
  });

  renderHud();
  cur.phase = "result";
  cur.pendingNext = c.next;
  cur.lines = val(c.result);
  cur.idx = 0;
  showLine();
}

function goNext() {
  let next = typeof cur.pendingNext === "function" ? cur.pendingNext() : cur.pendingNext;
  if (next === "procurement" && S.flags.overpromise && !S.flags.crisisDone) {
    S.flags.crisisDone = true;
    next = "pocCrisis";
  }
  if (next === "ending") { showEnding(); return; }
  transition(() => renderScene(next));
}

function transition(fn) {
  if (window.__FAST) { fn(); return; }
  const f = $("fade");
  f.classList.add("on");
  setTimeout(() => { fn(); setTimeout(() => f.classList.remove("on"), 80); }, 320);
}

function renderScene(id) {
  cur.id = id;
  const sc = SCENES[id];
  if (sc.stage) S.stage = sc.stage;
  setBg(val(sc.bg), sc.castTint);
  setCast(val(sc.cast));
  $("sceneTag").textContent = val(sc.tag);
  renderHud();
  cur.lines = val(sc.lines);
  cur.choiceList = val(sc.choices);
  cur.idx = 0;
  cur.phase = "scene";
  /* メッセージウィンドウを軽くスライドアップ */
  const mb = $("msgbox");
  mb.classList.remove("anim"); void mb.offsetWidth; mb.classList.add("anim");
  showLine();
}

function onAdvance() {
  if (cur.phase === "title" || cur.phase === "choosing" || cur.phase === "ended") return;
  if (typing) {
    clearInterval(typeTimer); typing = false;
    $("msgText").textContent = fullText; $("cursor").style.opacity = 1;
    return;
  }
  AudioFX.blip();
  cur.idx += 1;
  if (cur.idx < cur.lines.length) { showLine(); return; }
  if (cur.phase === "scene") showChoices();
  else if (cur.phase === "result") goNext();
}

/* ---------- HUD / drawer ---------- */
function renderHud() {
  const left = QUARTER_WEEKS - S.week;
  const wk = $("hudWeek");
  wk.textContent = `第${Math.min(S.week, QUARTER_WEEKS)}週/${QUARTER_WEEKS}週`;
  wk.className = left <= 3 ? "hud-danger" : "";
  $("weekFill").style.width = Math.min(100, S.week / QUARTER_WEEKS * 100) + "%";
  $("hudTrust").textContent = S.trust;
  $("trustFill").style.width = S.trust + "%";
  $("hudDisc").textContent = S.discount + "%";
  $("hudMeddic").textContent = Object.values(S.meddic).filter(Boolean).length + "/6";
  renderDrawer();
}

function renderDrawer() {
  $("drawer").innerHTML = `
    <div class="drawer-head">
      <span class="title">案件ファイル</span>
      <button class="drawer-close" onclick="toggleDrawer(false)" aria-label="閉じる">✕</button>
    </div>
    <h3>案件ステータス</h3>
    <div class="d-row"><span>四半期</span><b>第${Math.min(S.week, QUARTER_WEEKS)}週 / ${QUARTER_WEEKS}週</b></div>
    <div class="d-row"><span>信頼度</span><b>${S.trust} / 100</b></div>
    <div class="d-row"><span>商談ステージ</span><b>${S.stage}</b></div>
    <div class="d-row"><span>提示値引き</span><b>${S.discount} %</b></div>
    <h3>MEDDIC チェック</h3>
    ${MEDDIC_DEFS.map(m => `
      <div class="meddic-item ${S.meddic[m.key] ? "on" : ""}">
        <span class="dot"></span>
        <span><b>${m.name}</b><small>${m.jp}</small></span>
      </div>`).join("")}
    <h3>案件メモ</h3>
    <div id="drawerNotes">${S.notes.length ? S.notes.map(x => "・" + x).join("<br>") : "―"}</div>
    <h3>操作</h3>
    <div id="drawerNotes">クリック / スペース / Enter で読み進め。<br>選択肢で商談の運命が決まる。</div>`;
}

/* ---------- ending ---------- */
function showEnding() {
  cur.phase = "ended";
  const e = computeEnding();
  if (e.type === "win") { setBg("office", "rgba(255,170,60,.18)"); AudioFX.fanfare(); }
  else if (e.type === "slip") { setBg("office", "rgba(60,80,140,.3)"); AudioFX.bad(); }
  else { setBg("office", "rgba(20,30,60,.55)"); AudioFX.lose(); }
  $("sprites").innerHTML = "";
  $("msgbox").style.display = "none";
  $("sceneTag").style.display = "none";
  renderHud();

  $("endingCard").innerHTML = `
    <h2 class="${e.type}">${e.title}</h2>
    <div class="story">${e.story}</div>
    <div class="score-line"><span id="scoreNum">0</span><span style="color:#7e95b5;">/ 100</span></div>
    <div class="rank">${e.rank}</div>
    <table class="b-table">${e.breakdown.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("")}</table>
    <h3 style="font-size:.95rem; margin:18px 0 10px;">📋 商談振り返り(Deal Review)</h3>
    ${S.log.map(l => `<div class="review-item ${l.tone}"><b>${l.scene} ― 「${l.choice}」</b>${l.note}</div>`).join("")}
    <button class="restart" id="restartBtn">▶ もう一度プレイする(別の戦い方を試す)</button>`;
  $("ending").style.display = "flex";
  $("restartBtn").addEventListener("click", restart);

  /* スコア カウントアップ */
  const numEl = $("scoreNum");
  if (window.__FAST) { numEl.textContent = e.total; return; }
  const t0 = performance.now();
  (function tick(t) {
    const p = Math.min(1, (t - t0) / 1200);
    numEl.textContent = Math.round(e.total * (1 - Math.pow(1 - p, 3)));
    if (p < 1) requestAnimationFrame(tick);
  })(t0);
}

function restart() {
  S = newState();
  $("ending").style.display = "none";
  $("msgbox").style.display = "block";
  $("sceneTag").style.display = "block";
  transition(() => renderScene("intro"));
}

/* ---------- input ---------- */
function toggleDrawer(open) {
  const d = $("drawer"), s = $("drawerScrim");
  const willOpen = open === undefined ? !d.classList.contains("open") : open;
  d.classList.toggle("open", willOpen);
  s.classList.toggle("on", willOpen);
}

$("stage").addEventListener("click", () => { AudioFX.init(); onAdvance(); });

document.addEventListener("keydown", (e) => {
  AudioFX.init();
  /* タイトル */
  if (cur.phase === "title") {
    if (e.key === " " || e.key === "Enter") { e.preventDefault(); startGame(); }
    return;
  }
  /* 資料パネル展開中は背景操作を無効化。Escで閉じる */
  if ($("drawer").classList.contains("open")) {
    if (e.key === "Escape") { e.preventDefault(); toggleDrawer(false); }
    return;
  }
  /* 選択肢中 */
  if (cur.phase === "choosing") {
    if (e.key === "ArrowDown") { e.preventDefault(); moveChoiceFocus(1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); moveChoiceFocus(-1); }
    else if (/^[1-9]$/.test(e.key)) {
      const n = +e.key - 1;
      if (n < cur.choiceList.length) { e.preventDefault(); setChoiceFocus(n); pickChoice(n); }
    } else if (e.key === "Enter" || e.key === " ") {
      e.preventDefault(); if (choiceFocus >= 0) pickChoice(choiceFocus);
    }
    return;
  }
  /* 通常のテキスト送り */
  if (e.key === " " || e.key === "Enter") { e.preventDefault(); onAdvance(); }
});

$("drawer").addEventListener("click", (e) => e.stopPropagation());
$("drawerBtn").addEventListener("click", (e) => { e.stopPropagation(); toggleDrawer(); });
$("drawerScrim").addEventListener("click", (e) => { e.stopPropagation(); toggleDrawer(false); });
$("sndBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  AudioFX.muted = !AudioFX.muted;
  $("sndBtn").textContent = AudioFX.muted ? "🔇" : "🔊";
});
$("title").addEventListener("click", (e) => { e.stopPropagation(); startGame(); });

function startGame() {
  if (cur.phase !== "title") return;
  AudioFX.init(); AudioFX.select();
  $("title").style.display = "none";
  S = newState();
  renderScene("intro");
}

/* ---------- boot ---------- */
S = newState();
setBg("office", "rgba(5,10,25,.4)");
renderHud();
$("namePlate").style.display = "none";
$("msgText").textContent = "";
</script>
</body>
</html>
