<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
<defs>
  <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#d0d6e2"/>
    <stop offset="100%" stop-color="#bcc4d2"/>
  </linearGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8a9098"/>
    <stop offset="100%" stop-color="#6e7480"/>
  </linearGradient>
  <linearGradient id="ceil" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f0f3f8"/>
    <stop offset="100%" stop-color="#dce4ee"/>
  </linearGradient>
  <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8a9aae"/>
    <stop offset="100%" stop-color="#70808e"/>
  </linearGradient>
  <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e8eef8"/>
    <stop offset="100%" stop-color="#d8e2f0"/>
  </linearGradient>
  <filter id="blur6"><feGaussianBlur stdDeviation="6"/></filter>
</defs>

<!-- Ceiling -->
<rect width="1600" height="95" fill="url(#ceil)"/>
<rect y="92" width="1600" height="5" fill="#bcc8d8" opacity="0.6"/>

<!-- Back wall -->
<rect y="95" width="1600" height="585" fill="url(#wall)"/>

<!-- Floor (carpet) -->
<rect y="680" width="1600" height="220" fill="url(#floor)"/>
<rect y="678" width="1600" height="6" fill="#6a7280" opacity="0.8"/>

<!-- Floor perspective lines -->
<line x1="0"    y1="900" x2="800" y2="680" stroke="#70808e" stroke-width="2" opacity="0.25"/>
<line x1="400"  y1="900" x2="800" y2="680" stroke="#70808e" stroke-width="1.5" opacity="0.18"/>
<line x1="800"  y1="900" x2="800" y2="680" stroke="#70808e" stroke-width="1.5" opacity="0.15"/>
<line x1="1200" y1="900" x2="800" y2="680" stroke="#70808e" stroke-width="1.5" opacity="0.18"/>
<line x1="1600" y1="900" x2="800" y2="680" stroke="#70808e" stroke-width="2" opacity="0.25"/>

<!-- Projector screen on back wall -->
<rect x="480" y="145" width="640" height="380" rx="4" fill="url(#screen)" opacity="0.95"/>
<rect x="480" y="145" width="640" height="380" rx="4" fill="none" stroke="#c0c8d8" stroke-width="8"/>
<!-- Screen content: subtle grid/presentation -->
<rect x="510" y="168" width="200" height="22" rx="3" fill="#b8c4d4" opacity="0.50"/>
<rect x="510" y="200" width="580" height="12" rx="2" fill="#c8d0de" opacity="0.35"/>
<rect x="510" y="222" width="480" height="12" rx="2" fill="#c8d0de" opacity="0.28"/>
<rect x="510" y="244" width="540" height="12" rx="2" fill="#c8d0de" opacity="0.28"/>
<!-- Chart block -->
<rect x="510" y="278" width="160" height="90" rx="3" fill="#b0bece" opacity="0.40"/>
<rect x="682" y="308" width="120" height="60" rx="3" fill="#a8bace" opacity="0.38"/>
<rect x="814" y="290" width="100" height="78" rx="3" fill="#b8c8d8" opacity="0.40"/>
<!-- Screen mount -->
<rect x="790" y="525" width="20" height="60" fill="#b0bace" opacity="0.60"/>
<rect x="720" y="585" width="160" height="10" rx="2" fill="#a8b8c8" opacity="0.50"/>

<!-- Left side: whiteboard / wall panel -->
<rect x="50" y="160" width="300" height="390" rx="4" fill="#dde4f0" opacity="0.80"/>
<rect x="50" y="160" width="300" height="390" rx="4" fill="none" stroke="#c0cad8" stroke-width="7"/>
<!-- Board content -->
<line x1="90"  y1="220" x2="310" y2="220" stroke="#aab8c8" stroke-width="2.5" opacity="0.55"/>
<line x1="90"  y1="260" x2="290" y2="260" stroke="#aab8c8" stroke-width="2.5" opacity="0.45"/>
<line x1="90"  y1="300" x2="300" y2="300" stroke="#aab8c8" stroke-width="2.5" opacity="0.45"/>
<circle cx="110" cy="350" r="18" fill="none" stroke="#aab8c8" stroke-width="3" opacity="0.50"/>
<circle cx="110" cy="395" r="18" fill="none" stroke="#aab8c8" stroke-width="3" opacity="0.50"/>
<line x1="138" y1="350" x2="300" y2="350" stroke="#aab8c8" stroke-width="2.5" opacity="0.45"/>
<line x1="138" y1="395" x2="280" y2="395" stroke="#aab8c8" stroke-width="2.5" opacity="0.45"/>

<!-- Ceiling lights (2 rows) -->
<rect x="320" y="12" width="280" height="22" rx="4" fill="#f6faff" opacity="0.96"/>
<rect x="1000" y="12" width="280" height="22" rx="4" fill="#f6faff" opacity="0.96"/>
<ellipse cx="460"  cy="98" rx="200" ry="60" fill="#d8e4f4" opacity="0.28"/>
<ellipse cx="1140" cy="98" rx="200" ry="60" fill="#d8e4f4" opacity="0.28"/>

<!-- Conference table (perspective) -->
<path d="M200 900 L350 680 L1250 680 L1400 900 Z" fill="url(#table)" opacity="0.70"/>
<path d="M200 900 L350 680 L1250 680 L1400 900 Z" fill="none" stroke="#606e7e" stroke-width="3"/>
<!-- Table surface shine -->
<path d="M370 685 L480 685 L360 760 L250 770 Z" fill="#a8b8c8" opacity="0.20"/>

<!-- Chairs (simplified, behind table) -->
<rect x="460"  y="655" width="70" height="30" rx="4" fill="#7a8898" opacity="0.45" filter="url(#blur6)"/>
<rect x="620"  y="655" width="70" height="30" rx="4" fill="#7a8898" opacity="0.45" filter="url(#blur6)"/>
<rect x="780"  y="655" width="70" height="30" rx="4" fill="#7a8898" opacity="0.45" filter="url(#blur6)"/>
<rect x="940"  y="655" width="70" height="30" rx="4" fill="#7a8898" opacity="0.45" filter="url(#blur6)"/>
<rect x="1100" y="655" width="70" height="30" rx="4" fill="#7a8898" opacity="0.45" filter="url(#blur6)"/>

<!-- Baseboard -->
<rect y="670" width="1600" height="12" fill="#a8b4c2" opacity="0.45"/>
</svg>
