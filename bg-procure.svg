<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
<defs>
  <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#c8cfd8"/>
    <stop offset="100%" stop-color="#b4bcc8"/>
  </linearGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#909aa4"/>
    <stop offset="100%" stop-color="#747e88"/>
  </linearGradient>
  <linearGradient id="ceil" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e8ecf2"/>
    <stop offset="100%" stop-color="#d8dfe8"/>
  </linearGradient>
  <linearGradient id="cabinet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#a8b0ba"/>
    <stop offset="100%" stop-color="#909aa4"/>
  </linearGradient>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8ab0cc"/>
    <stop offset="100%" stop-color="#b8d0e4"/>
  </linearGradient>
  <filter id="blur5"><feGaussianBlur stdDeviation="5"/></filter>
  <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
</defs>

<!-- Ceiling -->
<rect width="1600" height="95" fill="url(#ceil)"/>
<rect y="92" width="1600" height="5" fill="#b0bac4" opacity="0.6"/>

<!-- Back wall (neutral grey-green) -->
<rect y="95" width="1600" height="585" fill="url(#wall)"/>

<!-- Floor (vinyl/tile) -->
<rect y="680" width="1600" height="220" fill="url(#floor)"/>
<rect y="678" width="1600" height="6" fill="#707880" opacity="0.8"/>

<!-- Tile floor pattern -->
<line x1="0"   y1="740" x2="1600" y2="740" stroke="#848c96" stroke-width="1.5" opacity="0.40"/>
<line x1="0"   y1="800" x2="1600" y2="800" stroke="#848c96" stroke-width="1.5" opacity="0.35"/>
<line x1="0"   y1="860" x2="1600" y2="860" stroke="#848c96" stroke-width="1.5" opacity="0.30"/>
<line x1="0"   y1="900" x2="800" y2="680" stroke="#848c96" stroke-width="2" opacity="0.28"/>
<line x1="267" y1="900" x2="800" y2="680" stroke="#848c96" stroke-width="1.5" opacity="0.20"/>
<line x1="534" y1="900" x2="800" y2="680" stroke="#848c96" stroke-width="1.5" opacity="0.16"/>
<line x1="800" y1="900" x2="800" y2="680" stroke="#848c96" stroke-width="1.5" opacity="0.16"/>
<line x1="1066" y1="900" x2="800" y2="680" stroke="#848c96" stroke-width="1.5" opacity="0.16"/>
