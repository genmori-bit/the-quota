<rect x="1028" y="550" width="120" height="4" fill="#8090a0" opacity="0.6"/>
<rect x="1048" y="368" width="80" height="14" rx="3" fill="#98a0aa" opacity="0.70"/>
<rect x="1048" y="448" width="80" height="14" rx="3" fill="#98a0aa" opacity="0.70"/>
<rect x="1048" y="528" width="80" height="14" rx="3" fill="#98a0aa" opacity="0.70"/>

<rect x="1160" y="340" width="120" height="330" rx="3" fill="url(#cabinet)"/>
