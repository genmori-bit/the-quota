<rect x="970" y="14" width="280" height="22" rx="4" fill="#f4f8ff" opacity="0.95"/>
<ellipse cx="490"  cy="98" rx="200" ry="62" fill="#d4dce8" opacity="0.25"/>
<ellipse cx="1110" cy="98" rx="200" ry="62" fill="#d4dce8" opacity="0.25"/>

<!-- Desk at bottom (table for procurement meetings) -->
<rect x="100" y="730" width="1400" height="170" rx="4" fill="#98a4ae" opacity="0.65" filter="url(#blur5)"/>
<rect y="670" width="1600" height="12" fill="#a0aab4" opacity="0.45"/>
