<line x1="1600" y1="900" x2="800" y2="680" stroke="#848c96" stroke-width="2" opacity="0.28"/>

<!-- Window (left, narrow) -->
<rect x="80" y="150" width="220" height="380" rx="5" fill="url(#sky)"/>
<rect x="80" y="150" width="220" height="380" rx="5" fill="none" stroke="#b0bac4" stroke-width="8"/>
<line x1="188" y1="150" x2="188" y2="530" stroke="#b0bac4" stroke-width="6"/>
<line x1="80"  y1="338" x2="300" y2="338" stroke="#b0bac4" stroke-width="6"/>
