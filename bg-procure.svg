<rect x="347"  y="452" width="22" height="6" rx="1" fill="#c8d0d8" opacity="0.75"/>
<rect x="347"  y="532" width="22" height="6" rx="1" fill="#c8d0d8" opacity="0.75"/>

<rect x="452"  y="340" width="120" height="330" rx="3" fill="url(#cabinet)"/>
