<circle cx="870" cy="178" r="5" fill="#c0a020" opacity="0.70"/>
<circle cx="698" cy="291" r="5" fill="#c0a020" opacity="0.70"/>
<circle cx="855" cy="271" r="5" fill="#c0a020" opacity="0.70"/>

<!-- Fluorescent lights -->
